<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宏耀考勤工资计算</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, "Microsoft YaHei", sans-serif; background: #f0f2f5; color: #333; }

        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        .header { text-align: center; padding: 30px 0 20px; }
        .header h1 { font-size: 24px; color: #1a1a1a; }
        .header p { color: #666; margin-top: 8px; }

        .card {
            background: #fff; border-radius: 12px; padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 20px;
        }

        .form-row { display: flex; gap: 16px; align-items: flex-end; flex-wrap: wrap; }
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-group label { font-size: 14px; color: #666; font-weight: 500; }
        .form-group select {
            padding: 8px 12px; border: 1px solid #d9d9d9; border-radius: 6px;
            font-size: 14px; background: #fff; min-width: 100px;
        }

        .upload-area {
            border: 2px dashed #d9d9d9; border-radius: 8px; padding: 40px;
            text-align: center; cursor: pointer; transition: all 0.3s; margin: 20px 0;
        }
        .upload-area:hover, .upload-area.dragover { border-color: #1677ff; background: #f0f5ff; }
        .upload-area .icon { font-size: 40px; color: #1677ff; }
        .upload-area p { color: #666; margin-top: 8px; }
        .upload-area .filename { color: #1677ff; font-weight: 500; margin-top: 8px; }

        .btn {
            padding: 10px 28px; border: none; border-radius: 6px; font-size: 15px;
            cursor: pointer; transition: all 0.3s; font-weight: 500;
        }
        .btn-primary { background: #1677ff; color: #fff; }
        .btn-primary:hover { background: #4096ff; }
        .btn-primary:disabled { background: #d9d9d9; cursor: not-allowed; }

        .loading { display: none; text-align: center; padding: 40px; }
        .loading .spinner {
            width: 40px; height: 40px; border: 4px solid #f0f0f0;
            border-top: 4px solid #1677ff; border-radius: 50%;
            animation: spin 1s linear infinite; margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .result-section { display: none; }

        .stats-row { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
        .stat-card {
            background: #fff; border-radius: 8px; padding: 16px 20px;
            flex: 1; min-width: 120px; box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        .stat-card .label { font-size: 13px; color: #999; }
        .stat-card .value { font-size: 24px; font-weight: 600; margin-top: 4px; }
        .stat-card .value.blue { color: #1677ff; }
        .stat-card .value.green { color: #52c41a; }
        .stat-card .value.red { color: #ff4d4f; }

        /* 部门分组 */
        .dept-group { margin-bottom: 16px; }
        .dept-header {
            display: flex; align-items: center; gap: 10px;
            padding: 12px 16px; background: #fafafa; border-radius: 8px 8px 0 0;
            border-bottom: 1px solid #f0f0f0; cursor: pointer; user-select: none;
        }
        .dept-header:hover { background: #f5f5f5; }
        .dept-header .dept-name { font-size: 16px; font-weight: 600; }
        .dept-header .dept-count {
            font-size: 12px; background: #1677ff; color: #fff;
            padding: 2px 8px; border-radius: 10px;
        }
        .dept-header .arrow {
            margin-left: auto; transition: transform 0.3s; font-size: 12px; color: #999;
        }
        .dept-header.collapsed .arrow { transform: rotate(-90deg); }

        .dept-body { border-radius: 0 0 8px 8px; overflow: hidden; }
        .dept-body.collapsed { display: none; }

        .emp-list { display: flex; flex-wrap: wrap; gap: 8px; padding: 16px; }
        .emp-tag {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 6px 14px; background: #f0f5ff; color: #1677ff;
            border-radius: 6px; font-size: 14px; transition: all 0.2s;
        }
        .emp-tag:hover { background: #d6e4ff; }
        .emp-tag.resigned {
            background: #fff1f0; color: #ff4d4f;
            text-decoration: line-through;
        }

        /* 生产部工资表格 */
        .section-title {
            font-size: 18px; font-weight: 600; margin: 30px 0 16px;
            padding-left: 12px; border-left: 4px solid #1677ff;
        }

        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th {
            background: #fafafa; padding: 12px 14px; text-align: left;
            font-weight: 500; color: #666; white-space: nowrap;
            border-bottom: 2px solid #f0f0f0;
        }
        td {
            padding: 12px 14px; border-bottom: 1px solid #f0f0f0;
            white-space: nowrap;
        }
        tr:hover td { background: #fafafa; }

        .shift-tag {
            display: inline-block; padding: 2px 10px; border-radius: 4px;
            font-size: 12px; font-weight: 500;
        }
        .shift-tag.day { background: #fff7e6; color: #d46b08; }
        .shift-tag.night { background: #e6f4ff; color: #0958d9; }

        .salary-total { font-weight: 700; color: #1677ff; font-size: 15px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>宏耀考勤工资计算系统</h1>
        <p>上传钉钉考勤报表，自动解析人员与部门</p>
    </div>

    <!-- 上传区 -->
    <div class="card">
        <form id="uploadForm">
            <div class="form-row">
                <div class="form-group">
                    <label>年份</label>
                    <select name="year" id="year">
                        {% for y in range(current_year - 1, current_year + 2) %}
                        <option value="{{ y }}" {{ 'selected' if y == current_year }}>{{ y }}年</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label>月份</label>
                    <select name="month" id="month">
                        {% for m in range(1, 13) %}
                        <option value="{{ m }}" {{ 'selected' if m == current_month }}>{{ m }}月</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <button type="submit" class="btn btn-primary" id="parseBtn" disabled>解析计算</button>
                </div>
            </div>

            <div class="upload-area" id="dropZone">
                <div class="icon">📁</div>
                <p>点击上传或拖拽考勤表到此处</p>
                <p style="font-size:12px;color:#999">支持 .xlsx 格式（钉钉导出的考勤报表）</p>
                <div class="filename" id="fileName"></div>
                <input type="file" id="fileInput" name="file" accept=".xlsx" style="display:none">
            </div>
        </form>
    </div>

    <!-- 加载中 -->
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>正在解析考勤表...</p>
    </div>

    <!-- 结果区 -->
    <div class="result-section" id="resultSection">
        <!-- 统计 -->
        <div class="stats-row">
            <div class="stat-card">
                <div class="label">日期范围</div>
                <div class="value" id="statRange" style="font-size:16px"></div>
            </div>
            <div class="stat-card">
                <div class="label">总人数</div>
                <div class="value blue" id="statTotal"></div>
            </div>
            <div class="stat-card">
                <div class="label">在职</div>
                <div class="value green" id="statActive"></div>
            </div>
            <div class="stat-card">
                <div class="label">离职</div>
                <div class="value red" id="statResigned"></div>
            </div>
        </div>

        <!-- 部门分组列表 -->
        <div id="deptList"></div>

        <!-- 生产部工资明细 -->
        <div id="productionSection" style="display:none">
            <div class="section-title">生产部工资明细</div>
            <div class="card" style="padding:0; overflow:hidden;">
                <div class="table-wrapper">
                    <table id="productionTable">
                        <thead>
                            <tr>
                                <th>姓名</th>
                                <th>班次</th>
                                <th>工作日出勤(天)</th>
                                <th>周末出勤(天)</th>
                                <th>基本工资</th>
                                <th>加班工时(h)</th>
                                <th>加班工资</th>
                                <th>周末工时(h)</th>
                                <th>周末工资</th>
                                <th>夜班天数</th>
                                <th>夜班补贴</th>
                                <th>应发合计</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const parseBtn = document.getElementById('parseBtn');
let selectedFile = null;

dropZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', (e) => {
    if (e.target.files[0]) selectFile(e.target.files[0]);
});

dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    if (e.dataTransfer.files[0]) selectFile(e.dataTransfer.files[0]);
});

function selectFile(file) {
    if (!file.name.endsWith('.xlsx')) {
        alert('请上传 .xlsx 格式文件');
        return;
    }
    selectedFile = file;
    document.getElementById('fileName').textContent = file.name;
    parseBtn.disabled = false;
}

document.getElementById('uploadForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    if (!selectedFile) return;

    const formData = new FormData();
    formData.append('file', selectedFile);
    formData.append('year', document.getElementById('year').value);
    formData.append('month', document.getElementById('month').value);

    document.getElementById('loading').style.display = 'block';
    document.getElementById('resultSection').style.display = 'none';
    parseBtn.disabled = true;

    try {
        const res = await fetch('/parse', { method: 'POST', body: formData });
        const data = await res.json();

        if (data.error) {
            alert(data.error);
            return;
        }

        renderResult(data);
    } catch (err) {
        alert('请求失败: ' + err.message);
    } finally {
        document.getElementById('loading').style.display = 'none';
        parseBtn.disabled = false;
    }
});

function fmt(n) {
    return typeof n === 'number' ? (Number.isInteger(n) ? n : n.toFixed(2)) : n;
}

function renderResult(data) {
    document.getElementById('statRange').textContent = data.date_range;
    document.getElementById('statTotal').textContent = data.total_count;
    document.getElementById('statActive').textContent = data.active_count;
    document.getElementById('statResigned').textContent = data.resigned_count;

    // 部门分组
    let html = '';
    for (const [dept, emps] of Object.entries(data.departments)) {
        html += `
        <div class="dept-group card">
            <div class="dept-header" onclick="toggleDept(this)">
                <span class="dept-name">${dept}</span>
                <span class="dept-count">${emps.length}人</span>
                <span class="arrow">▼</span>
            </div>
            <div class="dept-body">
                <div class="emp-list">
                    ${emps.map(e => `<span class="emp-tag">${e.name}</span>`).join('')}
                </div>
            </div>
        </div>`;
    }

    if (data.resigned && data.resigned.length > 0) {
        html += `
        <div class="dept-group card">
            <div class="dept-header collapsed" onclick="toggleDept(this)">
                <span class="dept-name">离职人员</span>
                <span class="dept-count" style="background:#ff4d4f">${data.resigned.length}人</span>
                <span class="arrow">▼</span>
            </div>
            <div class="dept-body collapsed">
                <div class="emp-list">
                    ${data.resigned.map(e => `<span class="emp-tag resigned">${e.name}（${e.department}）</span>`).join('')}
                </div>
            </div>
        </div>`;
    }

    document.getElementById('deptList').innerHTML = html;

    // 生产部工资表
    const pr = data.production_results;
    const prodSection = document.getElementById('productionSection');

    if (pr && pr.length > 0) {
        let tbody = '';
        pr.forEach(r => {
            const shiftCls = r.shift_type === '夜班' ? 'night' : 'day';
            tbody += `<tr>
                <td>${r.name}</td>
                <td><span class="shift-tag ${shiftCls}">${r.shift_type}</span></td>
                <td>${r.workday_days}</td>
                <td>${r.weekend_days}</td>
                <td>${fmt(r.base_salary)}</td>
                <td>${r.weekday_ot_hours}</td>
                <td>${fmt(r.weekday_ot_salary)}</td>
                <td>${r.weekend_hours}</td>
                <td>${fmt(r.weekend_salary)}</td>
                <td>${r.night_shift_days}</td>
                <td>${fmt(r.night_snack)}</td>
                <td class="salary-total">${fmt(r.total_salary)}</td>
            </tr>`;
        });
        document.querySelector('#productionTable tbody').innerHTML = tbody;
        prodSection.style.display = 'block';
    } else {
        prodSection.style.display = 'none';
    }

    document.getElementById('resultSection').style.display = 'block';
    document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth' });
}

function toggleDept(header) {
    header.classList.toggle('collapsed');
    header.nextElementSibling.classList.toggle('collapsed');
}
</script>
</body>
</html>
